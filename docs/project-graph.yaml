relations:
# agentprecept/ → scripts/
- from: agentprecept/mcp_server.py
  to: scripts/basic-audit.py
  type: import
- from: agentprecept/mcp_server.py
  to: scripts/sync-graph.py
  type: import
- from: agentprecept/cli.py
  to: scripts/sync-graph.py
  type: import
- from: agentprecept/cli.py
  to: scripts/basic-audit.py
  type: import
# AGENTS.md → 代码层
- from: AGENTS.md
  to: agentprecept/cli.py
  type: reference
- from: AGENTS.md
  to: scripts/sync-graph.py
  type: reference
- from: AGENTS.md
  to: scripts/basic-audit.py
  type: reference
# docs/ → methodology/ + templates/
- from: docs/L2_D01_architecture_架构设计.md
  to: methodology/
  type: reference
- from: docs/INDEX.md
  to: templates/
  type: reference
# scripts/ → docs/
- from: scripts/sync-graph.py
  to: docs/project-graph.yaml
  type: write
- from: scripts/basic-audit.py
  to: docs/
  type: read
# MCP 通道
- from: mcp_server.py
  to: docs/HANDOFF.md
  type: read
- from: mcp_server.py
  to: docs/L4_O01_design-rationale_设计依据.md
  type: read
evolution:
- id: ADR-001
  topic: 为什么用 MIT 许可证
  decision: MIT（最大化传播，零使用门槛）
  date: 2026-06-06
- id: ADR-002
  topic: 为什么方法论用 00-14 编号而非 L{Level}_{CAT}{NN}
  decision: methodology/ 是教学材料，序号保持线性阅读顺序；项目文档才用 L 格式
  date: 2026-06-06
- id: ADR-003
  topic: 为什么 AGENTS.md 和 SKILL.md 并存
  decision: AGENTS.md 覆盖所有 Agent 工具；SKILL.md 给支持 Skill 机制的工具（CodeWhale/OpenCode 等）提供一键安装
  date: 2026-06-06
- id: ADR-004
  topic: 为什么模板不全部预设为 📝
  decision: ⏳ 待撰写是模板的正确状态——表示"待用户填入"。只有通用性极高的模板（命名规范、设计依据等）设为 📝
  date: 2026-06-06
- id: ADR-005
  topic: 为什么 MCP Server 需要 PYTHONIOENCODING=utf-8
  decision: Windows GBK 终端下 Python stderr 输出中文导致 MCP 握手消息损坏→Server 注册失败（5 tool 全未注册）。修复：mcp.json 加 env.PYTHONIOENCODING=utf-8 + env.PYTHONUTF8=1
  date: 2026-06-07
- id: ADR-006
  topic: 为什么 mcp-tools.md 配置示例从 TOML 改为 mcp.json
  decision: 原文档 CodeWhale 配置段用了不存在的 [mcp_servers] TOML 格式，实际 CodeWhale 读取 ~/.deepseek/mcp.json。修正为正确的 JSON 格式 + 补充 cwd/env/编码注意事项
  date: 2026-06-07
- id: ADR-007
  topic: 为什么 MCP Resources 暂不实现
  decision: Tools 是所有 Agent 工具的最大公约数（全支持），Resources 仅 Claude/CodeWhale 明确支持。加 Resource 时保留 Tool fallback——计划未来版本实现
  date: 2026-06-07
- id: ADR-008
  topic: 为什么从 agent-compass 改名为 AgentPrecept
  decision: 外部评价指出搜索 "Agent Compass" 70% 指向 Future AGI 商业产品。precept（戒律）比 compass（指南针）更精确覆盖"设计先行+强制拦截"。多候选池对比（AION/Stela/Knot/Herm/DevCompass）后选 AgentPrecept，基于小白+Agent 双群体口述传播测试。
  date: 2026-06-08
- id: ADR-009
  topic: 为什么 init 从文档复制器升级为能力接入器
  decision: 当前 init 只复制文件，用户需手动 git init/配 MCP/装 hook/配 CI。改为 6 阶段自动检测+配置，一键接入全部能力。
  date: 2026-06-08
- id: ADR-010
  topic: 为什么强制拦截分三层
  decision: AgentPrecept 无法拦截 Agent 工具的 write_file。三层分别在可达节点：MCP tool（软）、git commit（硬可跳过）、CI PR merge（硬不可跳过）。
  date: 2026-06-08
- id: ADR-011
  topic: 为什么 checklist 项必须对齐 commit 粒度
  decision: "实战教训——粗粒度 checklist 导致 commit 过大不可独立 revert。标准: 1-3 commit/item，架构边界 = 任务边界。"
  date: 2026-06-08