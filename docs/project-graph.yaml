structure:
  AGENTS.md:
    type: entrypoint
    stability: critical
    description: 所有 Agent 工具的自动入口
  README.md:
    type: entrypoint
    stability: stable
    description: 门面
  docs/:
    type: package
    stability: stable
    description: agentprecept 自身文档体系（7 文件，不含开发者元信息）
    children:
    - INDEX.md
    - L1_A01_quickstart_快速开始.md
    - L2_D01_architecture_架构设计.md
    - L4_M01_changelog_变更日志.md
    - L4_O01_design-rationale_设计依据.md
    - mcp-tools.md
    - project-graph.yaml
  methodology/:
    type: package
    stability: stable
    description: 方法论核心文档
    children:
    - 00-lifecycle.md
    - 01-why-docs-first.md
    - 02-naming-is-navigation.md
    - 03-design-rationale.md
    - 04-audit-framework.md
    - 05-handoff-pattern.md
    - 06-three-layer-graph.md
    - 07-dev-workflow.md
    - 08-engineering.md
    - 09-security.md
    - 10-performance.md
    - 11-existing-project.md
    - 12-human-agent-collaboration.md
    - 13-agent-self-management.md
    - 14-production-readiness.md
    - INDEX.md
  skills/:
    type: package
    stability: stable
    description: 5 个核心 Skill
  agentprecept/:
    type: package
    stability: stable
    description: CLI + MCP 层（init/sync/audit/doctor/mcp_server）
    children:
    - cli.py
    - mcp_server.py
    - gnhf_task.py
  scripts/:
    type: package
    stability: stable
    description: 核心引擎（sync-graph 5维扫描/basic-audit 8维审计/init）
    children:
    - sync-graph.py
    - basic-audit.py
    - init.ps1
    - init.sh
    - graph-to-mermaid.py
