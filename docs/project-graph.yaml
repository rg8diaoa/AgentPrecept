structure:
  AGENTS.md:
    type: entrypoint
    stability: critical
    description: 所有 Agent 工具的自动入口
  README.md:
    type: entrypoint
    stability: stable
    description: 门面
  docs/:
    type: package
    stability: stable
    description: agent-compass 自身文档体系（7 文件，不含开发者元信息）
    children:
    - INDEX.md
    - L1_A01_quickstart_快速开始.md
    - L2_D01_architecture_架构设计.md
    - L4_M01_changelog_变更日志.md
    - L4_O01_design-rationale_设计依据.md
    - mcp-tools.md
    - project-graph.yaml
  methodology/:
    type: package
    stability: stable
    description: 方法论核心文档
    children:
    - 00-lifecycle.md
    - 01-why-docs-first.md
    - 02-naming-is-navigation.md
    - 03-design-rationale.md
    - 04-audit-framework.md
    - 05-handoff-pattern.md
    - 06-three-layer-graph.md
    - 07-dev-workflow.md
    - 08-engineering.md
    - 09-security.md
    - 10-performance.md
    - 11-existing-project.md
    - 12-human-agent-collaboration.md
    - 13-agent-self-management.md
    - 14-production-readiness.md
    - INDEX.md
  skills/:
    type: package
    stability: stable
    description: 5 个核心 Skill
  agent_compass/:
    type: package
    stability: stable
    description: CLI + MCP 层（init/sync/audit/doctor/mcp_server 5 tools）
    children:
    - cli.py
    - mcp_server.py
  scripts/:
    type: package
    stability: stable
    description: 核心引擎（sync-graph 5维扫描/basic-audit 8维审计/init）
    children:
    - sync-graph.py
    - basic-audit.py
    - init.ps1
    - init.sh
    - graph-to-mermaid.py
    - check-naming.py
  templates/:
    type: package
    stability: stable
    description: 16 分类可拷贝模板
    children:
    - INDEX.md
    - HANDOFF.md
    - MEMORY.md
    - AUDIT_REPORT.md
    - project-graph.yaml
    - L4_O01_design-rationale_设计依据.md
  examples/:
    type: package
    stability: stable
    description: 示例项目
    children:
    - prompt-templates.md
    - todo-api/
    - todo-api-node/
  reference/:
    type: package
    stability: stable
    description: 方法论有效性的参考案例
    children:
    - audit-journey.md
    - six-layer-graph.md
relations:
# agent_compass/ → scripts/
- from: agent_compass/mcp_server.py
  to: scripts/basic-audit.py
  type: import
- from: agent_compass/mcp_server.py
  to: scripts/sync-graph.py
  type: import
- from: agent_compass/cli.py
  to: scripts/sync-graph.py
  type: import
- from: agent_compass/cli.py
  to: scripts/basic-audit.py
  type: import
# AGENTS.md → 代码层
- from: AGENTS.md
  to: agent_compass/cli.py
  type: reference
- from: AGENTS.md
  to: scripts/sync-graph.py
  type: reference
- from: AGENTS.md
  to: scripts/basic-audit.py
  type: reference
# docs/ → methodology/ + templates/
- from: docs/L2_D01_architecture_架构设计.md
  to: methodology/
  type: reference
- from: docs/INDEX.md
  to: templates/
  type: reference
# scripts/ → docs/
- from: scripts/sync-graph.py
  to: docs/project-graph.yaml
  type: write
- from: scripts/basic-audit.py
  to: docs/
  type: read
# MCP 通道
- from: mcp_server.py
  to: docs/HANDOFF.md
  type: read
- from: mcp_server.py
  to: docs/L4_O01_design-rationale_设计依据.md
  type: read
evolution:
- id: ADR-001
  topic: 为什么用 MIT 许可证
  decision: MIT（最大化传播，零使用门槛）
  date: 2026-06-06
- id: ADR-002
  topic: 为什么方法论用 00-14 编号而非 L{Level}_{CAT}{NN}
  decision: methodology/ 是教学材料，序号保持线性阅读顺序；项目文档才用 L 格式
  date: 2026-06-06
- id: ADR-003
  topic: 为什么 AGENTS.md 和 SKILL.md 并存
  decision: AGENTS.md 覆盖所有 Agent 工具；SKILL.md 给支持 Skill 机制的工具（CodeWhale/OpenCode 等）提供一键安装
  date: 2026-06-06
- id: ADR-004
  topic: 为什么模板不全部预设为 📝
  decision: ⏳ 待撰写是模板的正确状态——表示"待用户填入"。只有通用性极高的模板（命名规范、设计依据等）设为 📝
  date: 2026-06-06
- id: ADR-005
  topic: 为什么 MCP Server 需要 PYTHONIOENCODING=utf-8
  decision: Windows GBK 终端下 Python stderr 输出中文导致 MCP 握手消息损坏→Server 注册失败（5 tool 全未注册）。修复：mcp.json 加 env.PYTHONIOENCODING=utf-8 + env.PYTHONUTF8=1
  date: 2026-06-07
- id: ADR-006
  topic: 为什么 mcp-tools.md 配置示例从 TOML 改为 mcp.json
  decision: 原文档 CodeWhale 配置段用了不存在的 `[mcp_servers]` TOML 格式，实际 CodeWhale 读取 `~/.deepseek/mcp.json`。修正为正确的 JSON 格式 + 补充 cwd/env/编码注意事项
  date: 2026-06-07
- id: ADR-007
  topic: 为什么 MCP Resources 暂不实现
  decision: Tools 是所有 Agent 工具的最大公约数（全支持），Resources 仅 Claude/CodeWhale 明确支持。加 Resource 时保留 Tool fallback——计划未来版本实现
  date: 2026-06-07
